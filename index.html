<style>
  :root{--bg:#0a0a0b;--surface:#141416;--surface-hover:#1c1c20;--border:#2a2a30;--text:#e8e6e3;--text-muted:#8a8a8f;--accent:#c9a96e;--accent-dim:rgba(201,169,110,0.12);--accent-glow:rgba(201,169,110,0.06)}
  *{margin:0;padding:0;box-sizing:border-box}
  html{background:#0a0a0b !important}
  body{background:#0a0a0b !important;color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
  body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}

  /* ── HERO ── */
  .hero{position:relative;padding:56px 24px 40px;text-align:center;overflow:hidden}
  .hero::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:500px;height:500px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);pointer-events:none}
  .hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border:1px solid var(--border);border-radius:100px;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:20px;animation:fadeDown .8s ease}
  .hero-badge span{width:5px;height:5px;border-radius:50%;background:var(--accent)}
  .hero h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(34px,8vw,52px);line-height:1.1;letter-spacing:-.5px;margin-bottom:14px;animation:fadeDown .8s ease .1s both;color:#ffffff}
  .hero h1 em{font-style:italic;color:var(--accent)}
  .hero>p{font-size:13px;color:var(--text-muted);font-weight:300;max-width:380px;margin:0 auto;line-height:1.65;animation:fadeDown .8s ease .2s both}

  /* ── NAVIGATION SECTIONS ── */
  .section-nav{max-width:480px;margin:0 auto;padding:0 24px 12px;animation:fadeDown .8s ease .25s both}
  .section-tabs{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .section-tab{flex:1;padding:14px 8px;background:none;border:none;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .3s;text-align:center;position:relative}
  .section-tab:hover{color:var(--text)}
  .section-tab.active{color:var(--accent);background:var(--accent-dim)}
  .section-tab:not(:last-child)::after{content:'';position:absolute;right:0;top:25%;height:50%;width:1px;background:var(--border)}

  /* ── MAIN CONTENT WRAPPER ── */
  .main{max-width:480px;margin:0 auto;padding:0 24px 80px}

  /* ── DESTINATIONS SECTION ── */
  .destinations-grid{display:flex;flex-direction:column;gap:16px;padding-top:24px}
  .destination-card{position:relative;border-radius:20px;overflow:hidden;cursor:pointer;transition:all .4s cubic-bezier(.25,.46,.45,.94);animation:fadeUp .6s ease both;border:1px solid var(--border)}
  .destination-card:nth-child(1){animation-delay:.05s}
  .destination-card:nth-child(2){animation-delay:.12s}
  .destination-card:nth-child(3){animation-delay:.19s}
  .destination-card:hover{border-color:rgba(201,169,110,0.3);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(201,169,110,0.1)}
  .destination-cover{width:100%;height:200px;object-fit:cover;display:block;filter:brightness(0.65);transition:filter .4s}
  .destination-card:hover .destination-cover{filter:brightness(0.75)}
  .destination-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:22px;background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 60%)}
  .destination-flag{font-size:20px;margin-bottom:6px}
  .destination-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:26px;color:#fff;line-height:1.15;margin-bottom:4px}
  .destination-desc{font-size:12px;color:rgba(255,255,255,0.7);font-weight:300;line-height:1.5}
  .destination-tag{position:absolute;top:16px;right:16px;padding:5px 12px;border-radius:100px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500}
  .destination-tag.ready{background:rgba(201,169,110,0.2);color:var(--accent);border:1px solid rgba(201,169,110,0.3)}
  .destination-tag.soon{background:rgba(255,255,255,0.08);color:var(--text-muted);border:1px solid rgba(255,255,255,0.1)}

  /* ── CURATED SECTION ── */
  .curated-intro{padding-top:28px;padding-bottom:20px;text-align:center;animation:fadeUp .6s ease both}
  .curated-intro h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:24px;color:#fff;margin-bottom:6px}
  .curated-intro p{font-size:13px;color:var(--text-muted);font-weight:300;line-height:1.6;max-width:360px;margin:0 auto}
  .curated-categories{display:flex;flex-direction:column;gap:12px;padding-top:8px}

  /* ── EXPANDABLE GROUP ── */
  .curated-group{animation:fadeUp .5s ease both;border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .3s}
  .curated-group.open{border-color:rgba(201,169,110,0.2)}
  .curated-group-toggle{display:flex;align-items:center;gap:12px;width:100%;padding:16px 18px;background:var(--surface);border:none;cursor:pointer;transition:background .3s;text-align:left;font-family:'DM Sans',sans-serif}
  .curated-group-toggle:hover{background:var(--surface-hover)}
  .curated-group-icon{width:40px;height:40px;border-radius:12px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
  .curated-group-info{flex:1;min-width:0}
  .curated-group-info h3{font-size:14px;font-weight:600;color:#fff;margin-bottom:1px}
  .curated-group-info p{font-size:11.5px;color:var(--text-muted);font-weight:300}
  .curated-group-count{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;border-radius:8px;background:var(--accent-dim);color:var(--accent);font-size:11px;font-weight:600;padding:0 7px;margin-right:4px}
  .curated-group-chevron{color:var(--accent);font-size:12px;transition:transform .3s;flex-shrink:0}
  .curated-group.open .curated-group-chevron{transform:rotate(180deg)}
  .curated-group-body{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.25,.46,.45,.94),opacity .3s;opacity:0}
  .curated-group.open .curated-group-body{max-height:2000px;opacity:1}
  .curated-group-content{padding:4px 16px 18px}

  /* ── DESTINATION DETAIL VIEW ── */
  .detail-back{display:inline-flex;align-items:center;gap:8px;background:none;border:none;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;padding:20px 0 8px;transition:color .3s;animation:fadeDown .5s ease}
  .detail-back:hover{color:var(--accent)}
  .detail-back .back-arrow{font-size:16px;transition:transform .3s}
  .detail-back:hover .back-arrow{transform:translateX(-3px)}
  .detail-hero{text-align:center;padding:8px 0 20px;animation:fadeDown .6s ease .05s both}
  .detail-hero h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(28px,7vw,40px);color:#fff;margin-bottom:6px}
  .detail-hero p{font-size:13px;color:var(--text-muted);font-weight:300;line-height:1.6}

  /* ── SHARED: TABS, CARDS, ETC ── */
  .tabs-container{position:sticky;top:0;z-index:100;background:rgba(10,10,11,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);margin:0 -24px;padding:0 24px;animation:fadeDown .8s ease .3s both}
  .tabs{display:flex;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:1;padding:15px 8px;background:none;border:none;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;position:relative;transition:color .3s;white-space:nowrap;text-align:center}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--accent)}
  .tab.active::after{content:'';position:absolute;bottom:0;left:20%;width:60%;height:2px;background:var(--accent);border-radius:2px;animation:tabLine .3s ease}

  .category-intro{margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border)}
  .category-intro h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:24px;margin-bottom:4px;color:#ffffff}
  .category-intro p{font-size:13px;color:var(--text-muted);font-weight:300}

  .gender-section{margin-bottom:28px;animation:fadeUp .5s ease both}
  .gender-label{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-left:2px}
  .gender-label::before{content:'';width:12px;height:1px;background:var(--accent)}
  .gender-label span{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);font-weight:500}

  .products{display:flex;flex-direction:column;gap:14px}
  .product-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all .35s cubic-bezier(.25,.46,.45,.94);animation:fadeUp .6s ease both}
  .product-card:nth-child(1){animation-delay:.05s}
  .product-card:nth-child(2){animation-delay:.12s}
  .product-card:nth-child(3){animation-delay:.19s}
  .product-card:hover{border-color:rgba(201,169,110,0.25);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3),0 0 0 1px rgba(201,169,110,0.08)}

  .product-inner{display:flex;gap:14px;padding:14px;align-items:center}
  .product-img{width:86px;height:86px;border-radius:12px;background:#f0eeeb;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .product-img img{width:100%;height:100%;object-fit:cover;border-radius:12px}
  .product-info{flex:1;min-width:0}
  .product-brand{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:3px}
  .product-name{font-size:13.5px;font-weight:600;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:#ffffff}
  .product-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .product-price{font-size:15px;font-weight:600;color:#ffffff}
  .product-rating{display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--text-muted)}
  .product-rating svg{width:12px;height:12px;fill:var(--accent)}

  .product-link{display:block;padding:11px 16px;border-top:1px solid var(--border);text-align:center;color:var(--accent);text-decoration:none;font-size:12.5px;font-weight:500;letter-spacing:.3px;transition:all .25s}
  .product-link:hover{background:var(--accent-dim)}
  .product-link .arrow{margin-left:6px;display:inline-block;transition:transform .25s}
  .product-link:hover .arrow{transform:translateX(4px)}

  .criteria{margin-bottom:20px}
  .criteria-toggle{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;color:#ffffff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s}
  .criteria-toggle:hover{border-color:rgba(201,169,110,0.3);background:var(--surface-hover)}
  .criteria-toggle .chevron{transition:transform .3s;font-size:11px;color:var(--accent)}
  .criteria-toggle.open .chevron{transform:rotate(180deg)}
  .criteria-panel{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.25,.46,.45,.94),opacity .3s;opacity:0}
  .criteria-panel.open{max-height:600px;opacity:1}
  .criteria-list{padding:20px 0 4px;display:flex;flex-direction:column;gap:14px}
  .criteria-item{display:flex;gap:14px;align-items:flex-start}
  .criteria-icon{width:36px;height:36px;border-radius:10px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
  .criteria-text h4{font-size:13px;font-weight:600;margin-bottom:2px;line-height:1.3;color:#ffffff}
  .criteria-text p{font-size:12px;color:var(--text-muted);font-weight:300;line-height:1.55}

  .empty-state{text-align:center;padding:52px 20px;animation:fadeUp .6s ease}
  .empty-icon{width:44px;height:44px;border:1px dashed var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--text-muted);font-size:18px}
  .empty-state h3{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:20px;margin-bottom:6px}
  .empty-state p{font-size:12.5px;color:var(--text-muted);font-weight:300;line-height:1.6}

  .price-note{text-align:center;font-size:10.5px;color:var(--text-muted);font-weight:300;padding:16px 0 0;font-style:italic}

  .footer{text-align:center;padding:24px;border-top:1px solid var(--border);max-width:480px;margin:0 auto}
  .footer p{font-size:11px;color:var(--text-muted);font-weight:300;letter-spacing:.5px}
  .footer a{color:var(--accent);text-decoration:none}

  @keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes tabLine{from{width:0;left:50%}to{width:60%;left:20%}}
</style>
</head>

// ═══════════════════════════════════════════
//  RENDERING HELPERS
// ═══════════════════════════════════════════

const main = document.getElementById('main');
const starSVG = `<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;

function productCard(item, i) {
  const storeName = item.store || 'Decathlon';
  const linkLabel = `Ver no ${storeName}`;
  const fallbackEmoji = storeName === 'AliExpress' ? '🎒' : '🥾';
  return `
    <div class="product-card" style="animation-delay:${i * 0.07}s">
      <div class="product-inner">
        <div class="product-img">
          <img src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.parentElement.innerHTML='${fallbackEmoji}'">
        </div>
        <div class="product-info">
          <div class="product-brand">${item.brand}</div>
          <div class="product-name">${item.name}</div>
          <div class="product-meta">
            <span class="product-price">${item.price}</span>
            <span class="product-rating">${starSVG} ${item.rating}</span>
          </div>
        </div>
      </div>
      <a class="product-link" href="${item.link}" target="_blank" rel="noopener">${linkLabel} <span class="arrow">&rarr;</span></a>
    </div>`;
}

function genderProducts(fem, masc) {
  let h = '';
  const hf = fem && fem.length > 0;
  const hm = masc && masc.length > 0;

  if (!hf && !hm) {
    return `<div class="empty-state" style="padding:28px 20px">
      <div class="empty-icon">✦</div>
      <h3>Em breve</h3>
      <p>Ainda pesquisando os melhores itens<br>para essa categoria. Volte logo!</p>
    </div>`;
  }

  if (hf) {
    h += '<div class="gender-section"><div class="gender-label"><span>Feminino</span></div><div class="products">';
    fem.forEach((item, i) => { h += productCard(item, i); });
    h += '</div></div>';
  }
  if (hm) {
    h += '<div class="gender-section"><div class="gender-label"><span>Masculino</span></div><div class="products">';
    masc.forEach((item, i) => { h += productCard(item, i + (fem ? fem.length : 0)); });
    h += '</div></div>';
  }
  h += '<p class="price-note">* Preços podem estar diferentes no site. Confirme antes de comprar.</p>';
  return h;
}

function criteriaBlock(criteria) {
  if (!criteria || criteria.length === 0) return '';
  return `
    <div class="criteria">
      <button class="criteria-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        Por que escolhi esses itens?
        <span class="chevron">&#9660;</span>
      </button>
      <div class="criteria-panel">
        <div class="criteria-list">
          ${criteria.map(c => `
            <div class="criteria-item">
              <div class="criteria-icon">${c.icon}</div>
              <div class="criteria-text">
                <h4>${c.title}</h4>
                <p>${c.text}</p>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
}

function countItems(group) {
  const f = group.items.feminino ? group.items.feminino.length : 0;
  const m = group.items.masculino ? group.items.masculino.length : 0;
  const t = group.items.todos ? group.items.todos.length : 0;
  return f + m + t;
}


// ═══════════════════════════════════════════
//  VIEWS
// ═══════════════════════════════════════════

let currentSection = 'destinos';
let currentDestination = null;
let currentDestTab = null;

function renderDestinations() {
  let h = '<div class="destinations-grid">';
  Object.values(destinations).forEach(d => {
    h += `
      <div class="destination-card" ${d.ready ? `onclick="openDestination('${d.id}')"` : ''} style="${!d.ready ? 'opacity:0.6;cursor:default' : ''}">
        <img class="destination-cover" src="${d.cover}" alt="${d.title}" loading="lazy" onerror="this.style.background='var(--surface)';this.style.height='200px'">
        <div class="destination-overlay">
          <div class="destination-flag">${d.flag}</div>
          <div class="destination-title">${d.title}</div>
          <div class="destination-desc">${d.desc}</div>
        </div>
        <span class="destination-tag ${d.ready ? 'ready' : 'soon'}">${d.ready ? 'Disponível' : 'Em breve'}</span>
      </div>`;
  });
  h += '</div>';
  main.innerHTML = h;
}

function openDestination(id) {
  currentDestination = id;
  const dest = destinations[id];
  const catKeys = Object.keys(dest.categories);
  currentDestTab = catKeys[0] || null;

  let h = `
    <button class="detail-back" onclick="goBack()">
      <span class="back-arrow">←</span> Todos os destinos
    </button>
    <div class="detail-hero">
      <h2>${dest.flag} ${dest.title}</h2>
      <p>${dest.tagline || dest.desc}</p>
    </div>`;

  if (catKeys.length > 0) {
    h += `<div class="tabs-container"><div class="tabs" id="destTabs">`;
    catKeys.forEach((key, i) => {
      h += `<button class="tab ${i === 0 ? 'active' : ''}" data-desttab="${key}">${dest.categories[key].title}</button>`;
    });
    h += `</div></div>`;
  }

  h += `<div id="destContent" style="padding-top:24px"></div>`;
  main.innerHTML = h;

  document.querySelectorAll('[data-desttab]').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('[data-desttab]').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentDestTab = tab.dataset.desttab;
      renderDestCategory();
    });
  });

  renderDestCategory();
}

function renderDestCategory() {
  const dest = destinations[currentDestination];
  const cat = dest.categories[currentDestTab];
  if (!cat) return;

  const el = document.getElementById('destContent');
  let h = '';
  if (cat.criteria) h += criteriaBlock(cat.criteria);
  h += `<div class="category-intro"><h2>${cat.title}</h2><p>${cat.subtitle}</p></div>`;
  h += genderProducts(cat.feminino, cat.masculino);
  el.innerHTML = h;
}

function renderCurated() {
  let h = `
    <div class="curated-intro">
      <h2>Curadoria de Itens</h2>
      <p>Recomendações avulsas para quem quer montar o próprio kit.</p>
    </div>
    <div class="curated-categories">`;

  Object.entries(curatedItems).forEach(([key, group], idx) => {
    const count = countItems(group);
    const hasItems = count > 0;

    h += `
      <div class="curated-group" id="cg-${key}" style="animation-delay:${idx * 0.08}s">
        <button class="curated-group-toggle" onclick="toggleCuratedGroup('${key}')">
          <div class="curated-group-icon">${group.icon}</div>
          <div class="curated-group-info">
            <h3>${group.title}</h3>
            <p>${hasItems ? count + (count === 1 ? ' item' : ' itens') : group.subtitle}</p>
          </div>
          ${hasItems ? `<span class="curated-group-count">${count}</span>` : ''}
          <span class="curated-group-chevron">▼</span>
        </button>
        <div class="curated-group-body">
          <div class="curated-group-content">`;

    if (hasItems) {
if (group.items.todos) {
  h += '<div class="products">';
  group.items.todos.forEach((item, i) => { h += productCard(item, i); });
  h += '</div><p class="price-note">* Preços podem estar diferentes no site. Confirme antes de comprar.</p>';
} else {
  h += genderProducts(group.items.feminino, group.items.masculino);
}    } else {
      h += `<div class="empty-state" style="padding:24px 12px">
        <div class="empty-icon">✦</div>
        <p>Em breve teremos recomendações aqui.</p>
      </div>`;
    }

    h += `</div></div></div>`;
  });

  h += '</div>';
  main.innerHTML = h;
}

function toggleCuratedGroup(key) {
  const el = document.getElementById('cg-' + key);
  if (el) el.classList.toggle('open');
}

function goBack() {
  currentDestination = null;
  renderDestinations();
}


// ═══════════════════════════════════════════
//  SECTION TABS
// ═══════════════════════════════════════════

document.querySelectorAll('.section-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentSection = tab.dataset.section;
    currentDestination = null;

    if (currentSection === 'destinos') renderDestinations();
    else renderCurated();
  });
});


// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
renderDestinations();
</script>
</body>
